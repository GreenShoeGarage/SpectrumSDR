*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}button,input,select{font:inherit}button{cursor:pointer}button:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--focus);outline-offset:2px}.app{display:grid;grid-template-columns:280px 1fr;height:100vh;overflow:hidden}.sidebar{background:var(--side);border-right:1px solid var(--border);padding:16px;display:flex;flex-direction:column;gap:14px;height:100vh;position:sticky;top:0;overflow-y:auto}.brand{display:flex;gap:10px;align-items:center}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--accent),#8b5cf6);box-shadow:var(--shadow)}.brand h1{font-size:19px;margin:0;line-height:1}.brand p{margin:2px 0 0;color:var(--muted);font-size:12px}.nav-title{font-size:11px;color:var(--muted);font-weight:850;letter-spacing:.12em;margin:14px 8px 6px}.nav-btn{width:100%;border:1px solid transparent;background:transparent;color:var(--text);display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;text-align:left}.nav-btn:hover{background:var(--chip)}.nav-btn.active{background:var(--accent2);border-color:var(--accent);font-weight:850}.side-actions{display:grid;grid-template-columns:1fr;gap:8px;margin:2px 0 4px}.side-footer{margin-top:auto;display:grid;gap:8px}.main{display:flex;flex-direction:column;min-width:0;height:100vh;overflow:auto}.topbar{position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--panel) 94%,transparent);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}.toolbar{display:flex;gap:8px;align-items:center;padding:10px 14px;flex-wrap:wrap}.tool-btn,.ghost-btn,.primary-btn,.danger-btn{border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:12px;padding:9px 12px}.primary-btn{background:var(--accent);color:#fff;border-color:var(--accent)}.danger-btn{background:var(--bad);color:#fff;border-color:var(--bad)}.ghost-btn{background:var(--chip)}.tool-btn[aria-pressed=true]{background:var(--accent2);border-color:var(--accent);font-weight:850}.spacer{flex:1}.search{min-width:220px;border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:12px;padding:9px 12px}.status{display:flex;gap:8px;align-items:center;padding:0 14px 10px;overflow:auto}.pill{white-space:nowrap;border:1px solid var(--border);background:var(--chip);border-radius:999px;padding:6px 10px;color:var(--text)}.pill.good{color:var(--good);border-color:color-mix(in srgb,var(--good) 45%,var(--border))}.pill.warn{color:var(--warn);border-color:color-mix(in srgb,var(--warn) 45%,var(--border))}.content{padding:18px;display:grid;gap:16px}.workspace-head{display:flex;gap:14px;align-items:flex-start;justify-content:space-between}.workspace-head h2{font-size:28px;margin:0}.workspace-head p{margin:4px 0 0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{grid-column:span 4;background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:16px;min-height:120px}.card.wide{grid-column:span 8}.card.full{grid-column:1/-1}.card.half{grid-column:span 6}.card h3{margin:0 0 8px;font-size:17px}.card p{color:var(--muted)}.metric{font-size:28px;font-weight:900}.form-row{display:grid;grid-template-columns:130px 1fr;gap:10px;align-items:center;margin:10px 0}.field{width:100%;border:1px solid var(--border);border-radius:12px;padding:9px 10px;background:var(--panel);color:var(--text)}.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.canvas{height:240px;border-radius:14px;border:1px solid var(--border);background:linear-gradient(180deg,#172554,#0f172a);position:relative;overflow:hidden}.trace{position:absolute;inset:0;background:repeating-linear-gradient(180deg,transparent 0 18px,rgba(255,255,255,.06) 19px),linear-gradient(90deg,transparent 0 8%,rgba(96,165,250,.3) 11%,transparent 14%,transparent 37%,rgba(34,197,94,.38) 41%,transparent 44%,transparent 69%,rgba(244,63,94,.38) 74%,transparent 78%)}.cursor{position:absolute;top:0;bottom:0;width:2px;background:#fff;left:50%;box-shadow:0 0 12px #fff}.waterfall{height:240px;border-radius:14px;border:1px solid var(--border);background:repeating-linear-gradient(180deg,#07111f 0 5px,#0b2344 6px,#1d4ed8 7px,#0f172a 10px)}.table{width:100%;border-collapse:collapse}.table th,.table td{border-bottom:1px solid var(--border);padding:9px;text-align:left}.table th{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.08em}.kbd{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--chip);border:1px solid var(--border);border-radius:6px;padding:2px 6px}.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-start;justify-content:center;padding-top:10vh;z-index:10}.modal.open{display:flex}.dialog{width:min(760px,92vw);background:var(--panel);color:var(--text);border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow);padding:16px}.dialog-head{display:flex;justify-content:space-between;align-items:center}.cmd-list{display:grid;gap:6px;margin-top:12px;max-height:360px;overflow:auto}.cmd-item{border:1px solid var(--border);background:var(--panel);color:var(--text);padding:10px;border-radius:12px;text-align:left}.cmd-item:hover{background:var(--accent2);border-color:var(--accent)}.toast{position:fixed;right:18px;bottom:18px;background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow);padding:12px 14px;border-radius:14px;display:none;z-index:12}.toast.show{display:block}.collapsed .app{grid-template-columns:76px 1fr}.collapsed .brand p,.collapsed .brand h1,.collapsed .nav-title,.collapsed .nav-btn span,.collapsed .side-footer .ghost-btn span,.collapsed .side-actions .ghost-btn span{display:none}.collapsed .sidebar{padding:12px}.test-pass{color:var(--good);font-weight:850}.test-fail{color:var(--bad);font-weight:850}
.radio-console{display:grid;grid-template-columns:280px minmax(460px,1fr) 300px;grid-template-rows:auto auto;gap:14px}.radio-left,.radio-center,.radio-right,.radio-bottom{background:var(--panel);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:16px}.radio-bottom{grid-column:1/-1}.radio-center{min-width:0}.freq-display{font-size:32px;font-weight:950;letter-spacing:.02em;border:1px solid var(--border);background:var(--chip);border-radius:16px;padding:12px 14px;text-align:center;margin:8px 0 10px}.freq-display input{font-size:32px;font-weight:950;text-align:center;border:0;background:transparent;color:var(--text);width:100%;outline:0}.step-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:10px 0}.step-grid button{padding:8px 6px}.signal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.signal-box{border:1px solid var(--border);background:var(--chip);border-radius:12px;padding:10px}.signal-box b{display:block;font-size:18px}.dock-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.dock-panel{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.mini-card{border:1px solid var(--border);background:var(--chip);border-radius:14px;padding:12px}.bookmark-row{display:flex;gap:8px;flex-wrap:wrap}.bookmark-row button{border-color:color-mix(in srgb,#a855f7 45%,var(--border))}.waterfall-tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.operator-mode .sidebar,.operator-mode .topbar{display:none}.operator-mode .app{grid-template-columns:1fr}.operator-mode .content{padding:10px}.operator-mode .radio-left,.operator-mode .radio-right,.operator-mode .radio-bottom,.operator-mode .workspace-head{display:none}.operator-mode .radio-console{grid-template-columns:1fr}.operator-mode .radio-center{min-height:90vh}.operator-mode .canvas{height:52vh}.operator-mode .waterfall{height:32vh}@media(max-width:1200px){.radio-console{grid-template-columns:1fr}.radio-bottom{grid-column:auto}.dock-panel{grid-template-columns:1fr 1fr}}
@media(max-width:900px){.app{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.card,.card.wide,.card.half{grid-column:1/-1}.search{width:100%;min-width:0}.workspace-head{display:block}}

.signals-layout{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}.signal-hero{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;gap:16px}.signal-card{border-left:5px solid var(--accent)}.info-grid{display:grid;grid-template-columns:auto 1fr;gap:8px 16px;margin:12px 0}.info-grid span,.muted{color:var(--muted)}.metric-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.metric-grid div{padding:12px;border:1px solid var(--border);border-radius:14px;background:var(--soft)}.metric-grid small{display:block;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}.metric-grid b{font-size:1.25rem}.toolbar-strip{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}.toolbar-strip .search{min-width:280px;flex:1}@media(max-width:950px){.signals-layout{grid-template-columns:1fr}.signal-hero{display:block}.toolbar-strip .search{min-width:100%}}
</style>

<body data-theme="light">
<div class="app"><aside class="sidebar" aria-label="Primary navigation"><div class="brand"><div class="logo"></div><div><h1>WebSDR Studio</h1><p>v14.9 Sidebar Recovery</p></div></div><div class="side-actions" aria-label="Persistent sidebar controls"><button class="ghost-btn" data-command="toggle-sidebar" title="Collapse or expand sidebar">☰ <span>Collapse sidebar</span></button><button class="ghost-btn" data-command="open-dev" title="Open Developer Diagnostics">🧪 <span>Developer diagnostics</span></button></div><nav id="nav"></nav></aside><main class="main"><header class="topbar"><div class="toolbar" id="toolbar"></div><div class="status" id="status"></div></header><section class="content" id="content" tabindex="-1"></section></main></div>
<div class="modal" id="commandModal"><div class="dialog"><div class="dialog-head"><h2>Quick Actions</h2><button class="ghost-btn" data-command="close-command">Close</button></div><input class="field" id="commandSearch" placeholder="Type a command, frequency, calculator, workspace..." autocomplete="off"><div class="cmd-list" id="commandList"></div></div></div>
<div class="modal" id="dialogModal"><div class="dialog"><div class="dialog-head"><h2 id="dialogTitle">Dialog</h2><button class="ghost-btn" data-command="close-dialog">Close</button></div><div id="dialogBody"></div></div></div><div class="toast" id="toast"></div>
<script>
(()=>{'use strict';
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>[...r.querySelectorAll(s)], key='websdr-v14-sprint6';
const defaultState={workspace:'home',theme:'light',sidebarCollapsed:false,lastCommand:'None',receiver:{connected:false,device:'RTL-SDR Blog V4',frequency:162.55,mode:'FM',gain:28,sampleRate:2.4,snr:24.6,recording:false,gps:false,scanning:false,step:0.005,bandwidth:12500,squelch:-55,agc:true,audioGain:70,muted:false,vfo:'A',vfoA:162.55,vfoB:146.52,scanIndex:0},metrics:{fps:60,cpu:12,heap:18,fftMs:3.4,renderMs:5.8,longSession:'Ready',a11yScore:96},events:[],projects:[{name:'NOAA Weather Monitoring',status:'Active',entries:1},{name:'433 MHz Sensor Hunt',status:'Open',entries:0}],journal:[{title:'NOAA weather baseline',time:'Today',tags:'weather, fm',project:'NOAA Weather Monitoring',notes:'Baseline observation from local weather radio.',freq:'162.550 MHz',mode:'FM'}],signals:[{freq:'162.550 MHz',type:'FM carrier',snr:'24.6 dB',status:'Stable'},{freq:'433.920 MHz',type:'Burst telemetry',snr:'16.1 dB',status:'Intermittent'}],memories:[{name:'NOAA Weather 1',freq:162.55,mode:'FM'},{name:'2m Calling',freq:146.52,mode:'FM'},{name:'70cm ISM',freq:433.92,mode:'NFM'}],recordings:[],markers:[{name:'A',freq:162.550,power:-48.2},{name:'B',freq:162.565,power:-61.4}],measurementSnapshots:[{time:'Today',freq:'162.550 MHz',snr:'24.6 dB',noise:'-72 dBFS',obw:'12.5 kHz'}],occupancy:[{band:'NOAA WX',pct:72},{band:'2m Amateur',pct:34},{band:'433 ISM',pct:18},{band:'Airband',pct:41}],rflab:{history:[],defaults:{txPower:10,txGain:3,rxGain:2,pathLoss:104,losses:2,forward:25,reflected:1,frequency:162.55,distance:15,noiseFigure:4,gain1:20,nf1:1.2,gain2:10,nf2:4,signal:-62,noise:-96,lo:145,rf:162.55,coaxLength:50,coaxLoss100:1.5,impedanceR:37,impedanceX:18,filterCenter:162.55,filterBw:12.5}}};
const state=load();function load(){try{return merge(structuredClone(defaultState),JSON.parse(localStorage.getItem(key)||'{}'))}catch(e){return structuredClone(defaultState)}}function merge(a,b){for(const k in b){if(b[k]&&typeof b[k]==='object'&&!Array.isArray(b[k]))a[k]=merge(a[k]||{},b[k]);else a[k]=b[k]}return a}function save(){localStorage.setItem(key,JSON.stringify(state))}function emit(type,payload={}){state.events.unshift({time:new Date().toLocaleTimeString(),type,payload});state.events=state.events.slice(0,120);save();renderStatus();if(state.workspace==='system')renderWorkspace('system',false)}function toast(msg){const el=$('#toast');el.textContent=msg;el.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>el.classList.remove('show'),1600)}
const navGroups=[{title:'Home',items:[['home','⌂','Home']]},{title:'Operate',items:[['radio','◉','Radio'],['signals','▧','Signals'],['decode','⌁','Decode']]},{title:'Engineering',items:[['rflab','⌬','RF Lab'],['journal','✎','Journal'],['geospatial','◎','Geospatial']]},{title:'System',items:[['system','⚙','System']]}];
const workspaces={home:['Home','Operational dashboard and launch point.'],radio:['Radio','Tune, listen, scan, and record.'],signals:['Signals','Measurements, markers, occupancy, comparison, and signal intelligence verification.'],decode:['Decode','Protocol decoder workbench and event logs.'],rflab:['RF Lab','Sprint 4: verified calculators and RF design tools.'],journal:['Journal','Sprint 5: verified project-based engineering record and reporting.'],geospatial:['Geospatial','GPS observations, coverage, and transmitter mapping.'],system:['System','Settings, diagnostics, shortcuts, performance, accessibility, and verification.']};
const commands={
'go-home':['Go to Home',()=>setWorkspace('home')],'go-radio':['Go to Radio',()=>setWorkspace('radio')],'go-signals':['Go to Signals',()=>setWorkspace('signals')],'go-decode':['Go to Decode',()=>setWorkspace('decode')],'go-rflab':['Go to RF Lab',()=>setWorkspace('rflab')],'go-journal':['Go to Journal',()=>setWorkspace('journal')],'go-geospatial':['Go to Geospatial',()=>setWorkspace('geospatial')],'go-system':['Go to System',()=>setWorkspace('system')],
'connect':['Connect/disconnect receiver',()=>{state.receiver.connected=!state.receiver.connected;emit('receiver:connect',{connected:state.receiver.connected});refresh();toast(state.receiver.connected?'Receiver connected':'Receiver disconnected')}],
'scan':['Start/stop scan',()=>{state.receiver.scanning=!state.receiver.scanning;emit('scan:toggle',{scanning:state.receiver.scanning});refresh();toast(state.receiver.scanning?'Scan started':'Scan stopped')}],
'scan-next':['Scan next memory',()=>{const m=nextMemory();tune(m.freq,m.mode);emit('scan:next',m);toast('Tuned '+m.name)}],
'record':['Start/stop recording',()=>{state.receiver.recording=!state.receiver.recording;if(state.receiver.recording)state.recordings.unshift({time:new Date().toLocaleString(),freq:state.receiver.frequency.toFixed(3),mode:state.receiver.mode,type:'audio'});emit('record:toggle',{recording:state.receiver.recording});refresh();toast(state.receiver.recording?'Recording started':'Recording stopped')}],
'record-iq':['Start IQ capture',()=>{state.recordings.unshift({time:new Date().toLocaleString(),freq:state.receiver.frequency.toFixed(3),mode:state.receiver.mode,type:'IQ'});emit('record:iq');refresh();toast('IQ capture added')}],
'operator-mode':['Toggle operator mode',()=>{document.body.classList.toggle('operator-mode');emit('ui:operatorMode',{active:document.body.classList.contains('operator-mode')});toast(document.body.classList.contains('operator-mode')?'Operator mode on':'Operator mode off')}],
'waterfall-freeze':['Freeze waterfall',()=>{state.receiver.waterfallFrozen=!state.receiver.waterfallFrozen;emit('waterfall:freeze',{frozen:state.receiver.waterfallFrozen});refresh();toast(state.receiver.waterfallFrozen?'Waterfall frozen':'Waterfall live')}],
'waterfall-palette':['Cycle waterfall palette',()=>{const palettes=['Classic','Thermal','Viridis','Mono'];const cur=state.receiver.palette||'Classic';state.receiver.palette=palettes[(palettes.indexOf(cur)+1)%palettes.length];emit('waterfall:palette',{palette:state.receiver.palette});refresh();toast('Palette: '+state.receiver.palette)}],
'signal-inspector':['Open signal inspector',()=>openSignalInspector()],
'snapshot':['Take radio snapshot',()=>{state.journal.unshift({title:`Snapshot ${state.receiver.frequency.toFixed(3)} MHz ${state.receiver.mode}`,time:new Date().toLocaleString(),tags:'snapshot, radio'});emit('capture:snapshot');toast('Snapshot saved to Journal')}],
'export':['Export session JSON',()=>download('websdr-session.json',JSON.stringify(state,null,2),'application/json')],
'open-journal':['Open Journal',()=>setWorkspace('journal')],'ai':['Ask signal assistant',()=>openDialog('Signal Assistant',`<p>Strongest signal is ${state.receiver.frequency.toFixed(3)} MHz in ${state.receiver.mode}. Current SNR is ${state.receiver.snr.toFixed(1)} dB.</p>`)],'settings':['Open System',()=>setWorkspace('system')],
'palette':['Open Quick Actions',()=>openCommand()],'close-command':['Close Quick Actions',()=>closeCommand()],'close-dialog':['Close Dialog',()=>closeDialog()],
'tune-help':['Spectrum tune controls',()=>openDialog('Spectrum Tuning',`<p><b>Click inside the spectrum</b> to tune relative to the current center frequency.</p><p><b>Mouse wheel over the spectrum</b> tunes by the selected step size.</p><p><b>Keyboard:</b> use ← and → in the Radio workspace to step down/up.</p><div class="btnrow"><button class="primary-btn" data-command="freq-keypad">Open Keypad</button><button class="ghost-btn" data-command="freq-down">− Step</button><button class="ghost-btn" data-command="freq-up">+ Step</button><button class="ghost-btn" data-command="close-dialog">Close</button></div>`)],
'freq-keypad':['Open frequency keypad',()=>openKeypad()],'freq-up':['Tune up one step',()=>stepTune(1)],'freq-down':['Tune down one step',()=>stepTune(-1)],'vfo-swap':['Swap VFO A/B',()=>{const r=state.receiver;[r.vfoA,r.vfoB]=[r.vfoB,r.vfoA];tune(r.vfo==='A'?r.vfoA:r.vfoB,r.mode);emit('vfo:swap');refresh();toast('VFO A/B swapped')}],
'vfo-toggle':['Toggle active VFO',()=>{const r=state.receiver;r.vfo=r.vfo==='A'?'B':'A';tune(r.vfo==='A'?r.vfoA:r.vfoB,r.mode);emit('vfo:toggle',{vfo:r.vfo});refresh();toast('VFO '+r.vfo)}],
'copy-vfo':['Copy current VFO to other',()=>{const r=state.receiver;if(r.vfo==='A')r.vfoB=r.frequency;else r.vfoA=r.frequency;emit('vfo:copy');refresh();toast('VFO copied')}],
'add-memory':['Add memory channel',()=>{const name=prompt('Memory name?',`${state.receiver.frequency.toFixed(3)} MHz ${state.receiver.mode}`);if(name){state.memories.unshift({name,freq:+state.receiver.frequency.toFixed(3),mode:state.receiver.mode});emit('memory:add',{name});refresh();toast('Memory added')}}],
'delete-memory':['Delete last memory',()=>{const m=state.memories.shift();emit('memory:delete',m||{});refresh();toast(m?'Memory deleted':'No memory to delete')}],
'mute':['Mute/unmute audio',()=>{state.receiver.muted=!state.receiver.muted;emit('audio:mute',{muted:state.receiver.muted});refresh();toast(state.receiver.muted?'Audio muted':'Audio unmuted')}],
'reset-radio':['Reset radio controls',()=>{Object.assign(state.receiver,{frequency:162.55,mode:'FM',gain:28,sampleRate:2.4,step:0.005,bandwidth:12500,squelch:-55,agc:true,audioGain:70,muted:false,scanning:false,recording:false,vfo:'A',vfoA:162.55,vfoB:146.52});emit('radio:reset');refresh();toast('Radio reset')}],
'add-project':['Add Journal project',()=>{const name=prompt('Project name?','New RF Investigation');if(name){state.projects=state.projects||[];state.projects.unshift({name,status:'Active',entries:0});emit('journal:project:add',{name});refresh();toast('Project added')}}],
'add-journal':['Add journal entry',()=>{const title=prompt('Entry title?',`Observation ${state.receiver.frequency.toFixed(3)} MHz`);if(!title)return;const project=prompt('Project?',(state.projects&&state.projects[0]?.name)||'General')||'General';const tags=prompt('Tags?','signal, measurement')||'';const notes=prompt('Notes?','')||'';state.journal.unshift({title,time:new Date().toLocaleString(),tags,project,notes,freq:state.receiver.frequency.toFixed(3)+' MHz',mode:state.receiver.mode,snr:state.receiver.snr.toFixed(1)+' dB'});state.projects=state.projects||[];let p=state.projects.find(x=>x.name===project);if(!p){p={name:project,status:'Active',entries:0};state.projects.unshift(p)}p.entries=(p.entries||0)+1;emit('journal:add',{title,project});refresh();toast('Journal entry added')}],
'edit-journal':['Edit latest journal entry',()=>{const j=state.journal[0];if(!j){toast('No journal entries');return}const title=prompt('Entry title?',j.title);if(!title)return;j.title=title;j.tags=prompt('Tags?',j.tags||'')||'';j.notes=prompt('Notes?',j.notes||'')||'';j.time=new Date().toLocaleString();emit('journal:edit',{title});refresh();toast('Journal entry updated')}],
'delete-journal':['Delete latest journal entry',()=>{const j=state.journal[0];if(!j){toast('No journal entries');return}if(confirm('Delete latest journal entry?')){state.journal.shift();emit('journal:delete',{title:j.title});refresh();toast('Journal entry deleted')}}],
'export-journal':['Export Journal JSON',()=>download('websdr-journal.json',JSON.stringify({projects:state.projects||[],journal:state.journal,recordings:state.recordings,measurements:state.measurementSnapshots},null,2),'application/json')],

'signal-tune-selected':['Tune strongest signal',()=>{const s=state.signals[0];if(!s){toast('No signal selected');return}const f=parseFloat(s.freq);if(!Number.isNaN(f)){tune(f);setWorkspace('radio');toast('Tuned '+s.freq)}}],
'signal-journal':['Journal current signal',()=>{const s=state.signals[0]||{freq:state.receiver.frequency.toFixed(3)+' MHz',type:state.receiver.mode+' carrier',snr:state.receiver.snr.toFixed(1)+' dB',status:'Observed'};state.journal.unshift({title:`Signal observation ${s.freq}`,time:new Date().toLocaleString(),tags:'signal, analysis',project:'Signal Investigation',notes:`${s.type}; SNR ${s.snr}; status ${s.status}.`,freq:s.freq,mode:state.receiver.mode,snr:s.snr});emit('signals:journal',{freq:s.freq});refresh();toast('Signal added to Journal')}],
'signal-report':['Export signal report',()=>{const lines=['# WebSDR Studio Signal Report','',`Generated: ${new Date().toLocaleString()}`,'',`Center: ${state.receiver.frequency.toFixed(3)} MHz ${state.receiver.mode}`,'',`Signals: ${state.signals.length}`,'',...state.signals.map(s=>`- ${s.freq}: ${s.type}, ${s.snr}, ${s.status}${s.bandwidth?`, BW ${s.bandwidth}`:''}`),'','## Measurement snapshots','',...state.measurementSnapshots.map(m=>`- ${m.time}: ${m.freq}, SNR ${m.snr}, OBW ${m.obw}`)];download('websdr-signal-report.md',lines.join('\n'),'text/markdown')}],
'signal-replay':['Open waterfall replay',()=>openDialog('Waterfall Replay',`<p>Replay is bounded to the current session measurement history.</p><p><b>${state.measurementSnapshots.length}</b> measurement snapshots and <b>${state.signals.length}</b> signal observations are available.</p><div class="canvas"><div class="trace"></div><div class="cursor"></div></div>`)],

'add-marker':['Add signal marker',()=>{const n=String.fromCharCode(65+(state.markers.length%26));state.markers.push({name:n,freq:+state.receiver.frequency.toFixed(3),power:+(-70+state.receiver.snr).toFixed(1)});emit('marker:add',{name:n});refresh();toast('Marker '+n+' added')}],

function execute(id){const c=commands[id];if(!c){toast('Missing command: '+id);return false}state.lastCommand=c[0];save();c[1]();renderToolbar();return true}function refresh(){renderStatus();renderToolbar();renderWorkspace(state.workspace,false);save()}function tune(freq,mode){const r=state.receiver;r.frequency=+freq;r.mode=mode||r.mode;if(r.vfo==='A')r.vfoA=r.frequency;else r.vfoB=r.frequency;r.snr=18+Math.abs(Math.sin(r.frequency))*14;emit('receiver:tune',{frequency:r.frequency,mode:r.mode})}function stepTune(dir){tune(+(state.receiver.frequency+dir*state.receiver.step).toFixed(6));refresh();toast((dir>0?'Up ':'Down ')+state.receiver.step+' MHz')}function nextMemory(){state.receiver.scanIndex=(state.receiver.scanIndex+1)%state.memories.length;return state.memories[state.receiver.scanIndex]}function applyTheme(){document.body.dataset.theme=state.theme;document.body.classList.toggle('collapsed',state.sidebarCollapsed)}
function buildNav(){const nav=$('#nav');nav.innerHTML=navGroups.map(g=>`<div><div class="nav-title">${g.title}</div>${g.items.map(([id,icon,label])=>`<button class="nav-btn ${state.workspace===id?'active':''}" data-workspace="${id}" aria-current="${state.workspace===id?'page':'false'}"><b>${icon}</b><span>${label}</span></button>`).join('')}</div>`).join('')}function buildToolbar(){const buttons=[['connect',state.receiver.connected?'Disconnect':'Connect'],['scan',state.receiver.scanning?'Stop Scan':'Scan'],['record',state.receiver.recording?'Stop Record':'Record'],['snapshot','Snapshot'],['export','Export'],['open-journal','Journal'],['ai','AI'],['settings','Settings']];$('#toolbar').innerHTML=`${buttons.map(([id,label])=>`<button class="tool-btn" data-command="${id}" aria-pressed="${pressed(id)}">${label}</button>`).join('')}<div class="spacer"></div><input class="search" id="globalSearch" placeholder="Search or press Ctrl+K"><button class="primary-btn" data-command="palette">Quick Actions</button>`}function pressed(id){return String((id==='connect'&&state.receiver.connected)||(id==='scan'&&state.receiver.scanning)||(id==='record'&&state.receiver.recording))}function renderToolbar(){buildToolbar()}function renderStatus(){const r=state.receiver;$('#status').innerHTML=[`<span class="pill ${r.connected?'good':'warn'}">${r.connected?'Connected':'Offline'}: ${r.device}</span>`,`<span class="pill">VFO ${r.vfo}</span>`,`<span class="pill">${r.frequency.toFixed(3)} MHz</span>`,`<span class="pill">${r.mode}</span>`,`<span class="pill">${r.sampleRate} MSPS</span>`,`<span class="pill">Gain +${r.gain} dB</span>`,`<span class="pill">SNR ${r.snr.toFixed(1)} dB</span>`,`<span class="pill ${r.recording?'good':''}">${r.recording?'Recording':'Idle'}</span>`,`<span class="pill">CPU ${state.metrics.cpu}%</span>`,`<span class="pill">FPS ${state.metrics.fps}</span>`,`<span class="pill">Heap ${state.metrics.heap}%</span>`].join('')}
function setWorkspace(id){if(!workspaces[id])return;state.workspace=id;save();emit('workspace:change',{workspace:id});renderWorkspace(id);buildNav();$('#content').focus()}function renderWorkspace(id=state.workspace,log=true){const w=workspaces[id];$('#content').innerHTML=`<div class="workspace-head"><div><h2>${w[0]}</h2><p>${w[1]}</p></div><div class="btnrow"><button class="ghost-btn" data-command="palette">Quick Actions</button><button class="ghost-btn" data-command="run-tests">Run Tests</button></div></div>`+workspaceHtml(id);if(log)emit('workspace:render',{workspace:id})}function workspaceHtml(id){return ({home:homeHtml,radio:radioHtml,signals:signalsHtml,decode:decodeHtml,rflab:rflabHtml,journal:journalHtml,geospatial:geospatialHtml,system:systemHtml}[id]||(()=>'<p>Unknown workspace.</p>'))()}
function homeHtml(){return `<div class="grid"><div class="card"><h3>Receiver</h3><div class="metric">${state.receiver.connected?'Online':'Offline'}</div><p>${state.receiver.frequency.toFixed(3)} MHz ${state.receiver.mode}</p><button class="primary-btn" data-command="go-radio">Open Radio</button></div><div class="card"><h3>Recent Signals</h3><p>${state.signals.length} observations in session.</p><button class="ghost-btn" data-command="go-signals">Open Signals</button></div><div class="card"><h3>Journal</h3><p>${state.journal.length} entries.</p><button class="ghost-btn" data-command="add-journal">Add Entry</button></div><div class="card wide"><h3>Spectrum Preview</h3><div class="canvas"><div class="trace"></div><div class="cursor"></div></div></div></div>`}
function radioHtml(){const r=state.receiver;const level=-54+Math.round(Math.random()*6-3);return `<div class="radio-console" id="radioWorkspace"><section class="radio-left"><h3>Receiver</h3><div class="signal-box"><span>Device</span><b>${r.connected?r.device:'Disconnected'}</b></div><div class="form-row"><label>Mode</label><select class="field" data-bind="mode">${['FM','NFM','AM','USB','LSB','CW','RAW IQ'].map(m=>`<option ${r.mode===m?'selected':''}>${m}</option>`).join('')}</select></div><div class="form-row"><label>Gain dB</label><input class="field" data-bind="gain" type="range" min="0" max="50" value="${r.gain}"></div><div class="form-row"><label>Sample rate</label><select class="field" data-bind="sampleRate">${[1.024,1.8,2.048,2.4,2.56,3.2].map(v=>`<option value="${v}" ${r.sampleRate===v?'selected':''}>${v} MSPS</option>`).join('')}</select></div><div class="form-row"><label>Bandwidth</label><input class="field" data-bind="bandwidth" type="number" step="100" value="${r.bandwidth}"></div><div class="form-row"><label>AGC</label><select class="field" data-bind="agc"><option value="true" ${r.agc?'selected':''}>On</option><option value="false" ${!r.agc?'selected':''}>Off</option></select></div><div class="btnrow"><button class="primary-btn" data-command="connect">${r.connected?'Disconnect':'Connect'}</button><button class="ghost-btn" data-command="reset-radio">Reset</button></div><h3>Bookmarks</h3><div class="bookmark-row">${state.memories.map((m,i)=>`<button class="ghost-btn" data-tune-memory="${i}" title="${m.freq.toFixed(3)} MHz">${escapeHtml(m.name)}</button>`).join('')}</div><div class="btnrow"><button class="ghost-btn" data-command="add-memory">Add current</button><button class="danger-btn" data-command="delete-memory">Delete first</button></div></section><section class="radio-center"><h3>Spectrum & Waterfall <button class="pill" data-command="tune-help" type="button">click, wheel, drag, inspect</button></h3><div class="freq-display"><input aria-label="Frequency in MHz" data-bind="frequency" type="number" step="${r.step}" value="${r.frequency.toFixed(6)}"></div><div class="step-grid"><button class="ghost-btn" data-action="step" data-step="-10">−10 MHz</button><button class="ghost-btn" data-action="step" data-step="-1">−1 MHz</button><button class="ghost-btn" data-command="freq-down">− Step</button><button class="ghost-btn" data-command="freq-up">+ Step</button><button class="ghost-btn" data-action="step" data-step="1">+1 MHz</button><button class="ghost-btn" data-action="step" data-step="10">+10 MHz</button><button class="ghost-btn" data-command="freq-keypad">Keypad</button><button class="ghost-btn" data-command="vfo-toggle">VFO ${r.vfo}</button><button class="ghost-btn" data-command="vfo-swap">Swap</button><button class="ghost-btn" data-command="operator-mode">Operator</button></div><div class="canvas" id="spectrumCanvas" data-radio-control="spectrum" title="Click to tune. Wheel to step. Double-click to inspect."><div class="trace"></div><div class="cursor"></div></div><div class="waterfall-tools"><button class="ghost-btn" data-command="waterfall-palette">Palette: ${r.palette||'Classic'}</button><button class="ghost-btn" data-command="waterfall-freeze">${r.waterfallFrozen?'Resume':'Freeze'}</button><button class="ghost-btn" data-command="signal-inspector">Signal Inspector</button><button class="ghost-btn" data-command="snapshot">Snapshot</button></div><div class="waterfall" aria-label="Waterfall display"></div></section><section class="radio-right"><h3>Live Signal</h3><div class="signal-grid"><div class="signal-box"><span>Frequency</span><b>${r.frequency.toFixed(6)} MHz</b></div><div class="signal-box"><span>Mode</span><b>${r.mode}</b></div><div class="signal-box"><span>Signal</span><b>${level} dBm</b></div><div class="signal-box"><span>SNR</span><b>${r.snr.toFixed(1)} dB</b></div><div class="signal-box"><span>OBW</span><b>${(r.bandwidth/1000).toFixed(1)} kHz</b></div><div class="signal-box"><span>Recording</span><b>${r.recording?'ON':'OFF'}</b></div></div><h3>Signal Inspector</h3><p>Click a visible signal or use the button below to create an investigation card.</p><div class="btnrow"><button class="primary-btn" data-command="signal-inspector">Inspect Signal</button><button class="ghost-btn" data-command="ai">AI Summary</button><button class="ghost-btn" data-command="open-journal">Journal</button></div></section><section class="radio-bottom"><div class="dock-tabs"><span class="pill">Audio</span><span class="pill">Scanner</span><span class="pill">Recorder</span><span class="pill">Measurements</span></div><div class="dock-panel"><div class="mini-card"><h3>Audio</h3><div class="form-row"><label>Volume</label><input class="field" data-bind="audioGain" type="range" min="0" max="100" value="${r.audioGain}"></div><div class="form-row"><label>Squelch</label><input class="field" data-bind="squelch" type="range" min="-100" max="0" value="${r.squelch}"></div><div class="btnrow"><button class="ghost-btn" data-command="mute">${r.muted?'Unmute':'Mute'}</button></div></div><div class="mini-card"><h3>Scanner</h3><p>${r.scanning?'Running':'Stopped'} · ${state.memories.length} memories</p><div class="btnrow"><button class="primary-btn" data-command="scan">${r.scanning?'Stop':'Start'} Scan</button><button class="ghost-btn" data-command="scan-next">Next</button></div></div><div class="mini-card"><h3>Recorder</h3><p>${state.recordings.length} files in session.</p><div class="btnrow"><button class="primary-btn" data-command="record">${r.recording?'Stop Audio':'Record Audio'}</button><button class="ghost-btn" data-command="record-iq">Record IQ</button></div></div><div class="mini-card"><h3>Measurements</h3><p>SNR ${r.snr.toFixed(1)} dB · Noise −72 dBFS</p><div class="btnrow"><button class="ghost-btn" data-command="measure-snapshot">Save Measurement</button><button class="ghost-btn" data-command="add-marker">Marker</button></div></div></div></section></div>`}
function signalsHtml(){const r=state.receiver;const noise=(-96+r.gain/3).toFixed(1);const obw=(r.bandwidth/1000).toFixed(1);const strongest=state.signals[0]||{freq:r.frequency.toFixed(3)+' MHz',type:r.mode+' carrier',snr:r.snr.toFixed(1)+' dB',status:'Observed',bandwidth:obw+' kHz',confidence:'Live'};const alerts=state.signals.filter(s=>/watch|intermittent|unknown/i.test(s.status||'')).length;return `<div class="signals-layout" id="signalsWorkspace"><section class="card signal-hero"><div><h3>Signal Inspector</h3><p class="muted">Investigation-first workspace for finding, measuring, comparing, documenting, and exporting signal observations.</p></div><div class="btnrow"><button class="primary-btn" data-command="signal-detect">Run Detection</button><button class="ghost-btn" data-command="measure-snapshot">Snapshot</button><button class="ghost-btn" data-command="signal-journal">Journal Signal</button><button class="ghost-btn" data-command="signal-report">Export Report</button></div></section><section class="card signal-card"><h3>Selected Signal</h3><p class="metric">${escapeHtml(strongest.freq)}</p><div class="info-grid"><span>Type</span><b>${escapeHtml(strongest.type)}</b><span>SNR</span><b>${escapeHtml(strongest.snr)}</b><span>Status</span><b>${escapeHtml(strongest.status)}</b><span>Bandwidth</span><b>${escapeHtml(strongest.bandwidth||obw+' kHz')}</b><span>Confidence</span><b>${escapeHtml(strongest.confidence||'Measured')}</b></div><div class="btnrow"><button class="primary-btn" data-command="signal-tune-selected">Tune</button><button class="ghost-btn" data-command="signal-inspector">Inspect</button><button class="ghost-btn" data-command="compare-signals">Compare</button></div></section><section class="card"><h3>Live Metrics</h3><div class="metric-grid"><div><small>SNR</small><b>${r.snr.toFixed(1)} dB</b></div><div><small>Noise</small><b>${noise} dBFS</b></div><div><small>OBW</small><b>${obw} kHz</b></div><div><small>Alerts</small><b>${alerts}</b></div></div><button class="ghost-btn" data-command="ai">Summarize</button></section><section class="card full"><h3>Signal Timeline</h3><div class="toolbar-strip"><input class="search" id="signalSearch" placeholder="Filter signals by frequency, type, status"><button class="ghost-btn" data-command="signal-replay">Replay</button><button class="ghost-btn" data-command="export-measurements">Export CSV</button><button class="danger-btn" data-command="clear-signal-log">Clear Log</button></div><table class="table" id="signalTable"><thead><tr><th>Frequency</th><th>Type</th><th>SNR</th><th>Status</th><th>Bandwidth</th><th>Confidence</th><th>Action</th></tr></thead><tbody>${state.signals.length?state.signals.map((s,i)=>`<tr data-signal-row="${i}"><td>${escapeHtml(s.freq)}</td><td>${escapeHtml(s.type)}</td><td>${escapeHtml(s.snr)}</td><td>${escapeHtml(s.status)}</td><td>${escapeHtml(s.bandwidth||'—')}</td><td>${escapeHtml(s.confidence||'—')}</td><td><button class="ghost-btn" data-signal-action="tune" data-signal-index="${i}">Tune</button><button class="ghost-btn" data-signal-action="journal" data-signal-index="${i}">Journal</button></td></tr>`).join(''):'<tr><td colspan="7">No signal observations. Run Detection or save a Measurement Snapshot.</td></tr>'}</tbody></table></section><section class="card half"><h3>Markers & Deltas</h3><div class="btnrow"><button class="primary-btn" data-command="add-marker">Add Marker</button><button class="ghost-btn" data-command="marker-clear">Clear Markers</button></div><table class="table" id="markerTable"><thead><tr><th>Name</th><th>MHz</th><th>Power</th></tr></thead><tbody>${state.markers.length?state.markers.map(m=>`<tr><td>${m.name}</td><td>${Number(m.freq).toFixed(3)}</td><td>${m.power} dBFS</td></tr>`).join(''):'<tr><td colspan="3">No markers yet.</td></tr>'}</tbody></table><p class="muted">Delta: ${state.markers.length>1?Math.abs(state.markers[0].freq-state.markers[1].freq).toFixed(3)+' MHz':'add two markers'}</p></section><section class="card half"><h3>Occup function openRfCalc(type){const d=state.rflab.defaults;const titles={link:'Link Budget',vswr:'VSWR',path:'Free-Space Path Loss',noise:'Noise Figure Cascade',dynamic:'Dynamic Range',pll:'PLL / Mixer',coax:'Coax Loss',smith:'Smith Chart Solver',match:'Matching Network',filter:'Filter Synthesis',osc:'Oscillator Design'};const forms={

function num(id,label,val){return `<div class="form-row"><label for="rf_${id}">${label}</label><input class="field" id="rf_${id}" type="number" step="any" value="${val}"></div>`}
function rfVal(id){const el=$('#rf_'+id);return parseFloat(el?.value)||0}
function calculateRf(type){let result='',details='',tool='RF Tool';const d=state.rflab.defaults;const set=(ids)=>ids.forEach(id=>d[id]=rfVal(id));if(type==='link'){set(['txPower','txGain','rxGain','pathLoss','losses']);const rx=d.txPower+d.txGain+d.rxGain-d.pathLoss-d.losses;tool='Link Budget';result=rx.toFixed(1)+' dBm';details=`Tx ${d.txPower} dBm, path ${d.pathLoss} dB, losses ${d.losses} dB`}
if(type==='vswr'){set(['forward','reflected']);const gamma=Math.sqrt(Math.max(0,d.reflected/d.forward));const vswr=(1+gamma)/(1-gamma);tool='VSWR';result=vswr.toFixed(2)+':1';details=`Reflection coefficient ${gamma.toFixed(3)}, return loss ${(-20*Math.log10(gamma||1e-9)).toFixed(1)} dB`}
if(type==='path'){set(['frequency','distance']);const loss=32.44+20*Math.log10(d.frequency)+20*Math.log10(d.distance);tool='Path Loss';result=loss.toFixed(1)+' dB';details=`${d.frequency} MHz across ${d.distance} km`}
if(type==='noise'){set(['gain1','nf1','gain2','nf2']);const f1=10**(d.nf1/10),f2=10**(d.nf2/10),g1=10**(d.gain1/10);const nf=10*Math.log10(f1+(f2-1)/g1);tool='Noise Figure';result=nf.toFixed(2)+' dB';details=`Friis cascade, total gain ${(d.gain1+d.gain2).toFixed(1)} dB`}
if(type==='dynamic'){set(['signal','noise']);const dr=d.signal-d.noise;tool='Dynamic Range';result=dr.toFixed(1)+' dB';details=`Signal ${d.signal} dBm, noise ${d.noise} dBm`}

if(type==='coax'){set(['coaxLength','coaxLoss100']);const loss=d.coaxLength/100*d.coaxLoss100;tool='Coax Loss';result=loss.toFixed(2)+' dB';details=`${d.coaxLength} ft at ${d.coaxLoss100} dB/100 ft`}
if(type==='smith'){set(['impedanceR','impedanceX']);const zmag=Math.hypot(d.impedanceR,d.impedanceX);const gammaMag=Math.hypot(d.impedanceR-50,d.impedanceX)/Math.hypot(d.impedanceR+50,d.impedanceX);tool='Smith Solver';result='|Γ| '+gammaMag.toFixed(3);details=`Z=${d.impedanceR}+j${d.impedanceX} Ω, |Z|=${zmag.toFixed(1)} Ω`}
if(type==='match'){set(['impedanceR','impedanceX','frequency']);const q=Math.sqrt(Math.max(0,50/d.impedanceR-1));const xs=q*d.impedanceR;tool='Matching Network';result='L-network estimate';details=`Approx series reactance ${xs.toFixed(1)} Ω at ${d.frequency} MHz; validate before build`}
if(type==='filter'){set(['filterCenter','filterBw']);const q=(d.filterCenter*1000)/d.filterBw;tool='Filter Synthesis';result='Q '+q.toFixed(1);details=`Center ${d.filterCenter} MHz, bandwidth ${d.filterBw} kHz`}
if(type==='osc'){set(['frequency','coaxLoss100']);const hz=d.frequency*1e6*d.coaxLoss100/1e6;tool='Oscillator';result='±'+hz.toFixed(1)+' Hz';details=`${d.coaxLoss100} ppm stability at ${d.frequency} MHz`}
const rec={time:new Date().toLocaleString(),tool,result,details};state.rflab.history.unshift(rec);state.rflab.history=state.rflab.history.slice(0,80);save();emit('rflab:calculate',rec);const box=$('#rfResult');if(box){box.style.display='block';box.innerHTML=`<h3>${tool}</h3><p class="metric">${result}</p><p>${details}</p>`}toast(tool+' calculated')}

function runTests(){const results=[];const test=(name,fn)=>{try{results.push({name,ok:!!fn()})}catch(e){results.push({name,ok:false,error:e.message})}};test('Navigation items exist',()=>$$('[data-workspace]').length===8);test('Persistent sidebar controls exist once',()=>$$('.side-actions [data-command=\"toggle-sidebar\"]').length===1&&$$('.side-actions [data-command=\"open-dev\"]').length===1);test('Sidebar is persistent height',()=>getComputedStyle($('.sidebar')).height!=='auto');test('All toolbar commands exist',()=>$$('#toolbar [data-command]').every(b=>commands[b.dataset.command]));test('Command count includes radio workflow',()=>['freq-keypad','freq-up','freq-down','vfo-swap','vfo-toggle','copy-vfo','add-memory','delete-memory','mute','reset-radio','scan-next','signal-inspector','operator-mode','waterfall-palette','waterfall-freeze','record-iq'].every(id=>commands[id]));test('Status ribbon populated',()=>$('#status').children.length>=9);test('No duplicate IDs',()=>{const ids=$$('[id]').map(e=>e.id);return ids.length===new Set(ids).size});const old=state.workspace;renderWorkspace('radio',false);test('Radio workspace renders',()=>!!$('#radioWorkspace'));test('Radio has spectrum click target',()=>!!$('[data-radio-control="spectrum"]'));test('Spectrum tune help button is wired',()=>!!$('[data-command="tune-help"]')&&!!commands['tune-help']);test('Radio has VFO controls',()=>$$('[data-bind]').filter(e=>['frequency','mode','gain','sampleRate','step','bandwidth','squelch','audioGain','agc'].includes(e.dataset.bind)).length>=9);test('Radio memory tune buttons exist',()=>$$('[data-tune-memory]').length===state.memories.length);test('Radio record command toggles state',()=>{const before=state.receiver.recording;commands.record[1]();const changed=state.receiver.recording!==before;commands.record[1]();return changed});renderWorkspace('signals',false);test('Signals workspace renders',()=>!!$('#signalsWorkspace'));test('Signals has measurement controls',()=>['measure-snapshot','add-marker','export-measurements','compare-signals','signal-detect','signal-report','signal-journal','signal-replay','signal-tune-selected'].every(id=>commands[id]));test('Signals tables render',()=>!!$('#signalTable')&&!!$('#markerTable')&&!!$('#occupancyTable')&&!!$('#snapshotTable'));renderWorkspace('rflab',false);test('RF Lab workspace renders',()=>!!$('#rflabWorkspace'));test('RF Lab calculator commands exist',()=>['calc-link','calc-vswr','calc-path','calc-noise','calc-dynamic','calc-pll','calc-coax','design-smith','design-match','design-filter','design-osc','export-rflab','clear-rflab'].every(id=>commands[id]));test('RF Lab removed Component Library and Worksheets',()=>!$('#content').textContent.includes('Component Library')&&!$('#content').textContent.includes('Worksheets'));test('RF Lab history table exists',()=>!!$('#rflabHistory'));
renderWorkspace('journal',false);test('Journal workspace renders',()=>!!$('#journalWorkspace'));test('Journal project and entry tables exist',()=>!!$('#projectTable')&&!!$('#journalTable'));test('Journal commands exist',()=>['add-project','add-journal','edit-journal','delete-journal','export-journal','export-report'].every(id=>commands[id]));test('Measurement snapshot command writes data',()=>{const before=state.measurementSnapshots.length;commands['measure-snapshot'][1]();return state.measurementSnapshots.length===before+1});test('Marker command writes data',()=>{const before=state.markers.length;commands['add-marker'][1]();return state.markers.length===before+1});state.workspace=old;renderWorkspace(old,false);test('Performance audit command exists',()=>!!commands['run-performance-audit']);test('Accessibility audit command exists',()=>!!commands['run-accessibility-audit']);test('Export test report command exists',()=>!!commands['export-test-report']);test('System performance monitor renders',()=>{renderWorkspace('system',false);return !!$('#devPanel')&&$('#content').textContent.includes('Performance Monitor')&&$('#content').textContent.includes('Accessibility Monitor')});test('Keyboard shortcuts registered',()=>true);const passed=results.filter(r=>r.ok).length;if(state.workspace!=='system')setWorkspace('system');setTimeout(()=>{$('#testOutput').innerHTML=`<p><b>${passed} Passed</b> · <b>${results.length-passed} Failed</b></p><table class="table"><tbody>${results.map(r=>`<tr><td>${r.name}</td><td class="${r.ok?'test-pass':'test-fail'}">${r.ok?'PASS':'FAIL'}</td><td>${r.error||''}</td></tr>`).join('')}</tbody></table>`},0);emit('tests:run',{passed,total:results.length});toast(`Verification: ${passed}/${results.length} passed`)}
function wire(){document.addEventListener('click',e=>{const ws=e.target.closest('[data-workspace]');if(ws){setWorkspace(ws.dataset.workspace);return}const cmd=e.target.closest('[data-command]');if(cmd){execute(cmd.dataset.command);return}const cr=e.target.closest('[data-command-run]');if(cr){closeCommand();execute(cr.dataset.commandRun);return}const tm=e.target.closest('[data-tune-memory]');if(tm){const m=state.memories[+tm.dataset.tuneMemory];if(m){tune(m.freq,m.mode);refresh();toast('Tuned '+m.name)}return}const sig=e.target.closest('[data-signal-action]');if(sig){handleSignalAction(sig.dataset.signalAction,+sig.dataset.signalIndex);return}const action=e.target.closest('[data-action]');if(action){handleAction(action.dataset.action);return}const spec=e.target.closest('[data-radio-control="spectrum"]');if(spec){const rect=spec.getBoundingClientRect();const offset=((e.clientX-rect.left)/rect.width-.5)*state.receiver.sampleRate; tune(+(state.receiver.frequency+offset).toFixed(6));refresh();toast('Spectrum click tuned')}});document.addEventListener('wheel',e=>{if(e.target.closest('[data-radio-control="spectrum"]')){e.preventDefault();stepTune(e.deltaY<0?1:-1)}},{passive:false});document.addEventListener('dblclick',e=>{if(e.target.closest('[data-radio-control="spectrum"]')){openSignalInspector()}});document.addEventListener('input',e=>{if(e.target.id==='commandSearch')renderCommandList(e.target.value);if(e.target.id==='globalSearch'&&e.target.value.length>1){openCommand();$('#commandSearch').value=e.target.value;renderCommandList(e.target.value)}if(e.target.id==='signalSearch'){filterSignalRows(e.target.value)}const b=e.target.dataset.bind;if(!b)return;const r=state.receiver;if(['frequency','step','sampleRate'].includes(b))r[b]=parseFloat(e.target.value)||r[b];else if(['gain','bandwidth','squelch','audioGain'].includes(b))r[b]=parseInt(e.target.value,10)||0;else if(b==='agc')r.agc=e.target.value==='true';else r[b]=e.target.value;if(b==='frequency')tune(r.frequency);else emit('receiver:update',{[b]:r[b]});renderStatus();save()});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeCommand();closeDialog()}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'){e.preventDefault();openCommand()}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='r'){e.preventDefault();setWorkspace('radio')}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='j'){e.preventDefault();setWorkspace('journal')}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){e.preventDefault();setWorkspace('signals')}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='l'){e.preventDefault();setWorkspace('rflab')}if((e.ctrlKey||e.metaKey)&&e.key===','){e.preventDefault();setWorkspace('system')}if(e.code==='Space'&&['INPUT','TEXTAREA','SELECT'].indexOf(document.activeElement.tagName)<0){e.preventDefault();execute('record')}if(state.workspace==='radio'&&['ArrowLeft','ArrowRight'].includes(e.key)&&['INPUT','TEXTAREA','SELECT'].indexOf(document.activeElement.tagName)<0){e.preventDefault();stepTune(e.key==='ArrowRight'?1:-1)}})}function handleSignalAction(a,i){const s=state.signals[i];if(!s)return;if(a==='tune'){const f=parseFloat(s.freq);if(!Number.isNaN(f)){tune(f);setWorkspace('radio');toast('Tuned '+s.freq)}}if(a==='journal'){state.journal.unshift({title:'Signal observation '+s.freq,time:new Date().toLocaleString(),tags:'signal, analysis',project:'Signal Investigation',notes:s.type+'; SNR '+s.snr+'; status '+s.status,freq:s.freq,mode:state.receiver.mode,snr:s.snr});emit('signals:journal',{freq:s.freq});refresh();toast('Signal added to Journal')}}function filterSignalRows(q){q=(q||'').toLowerCase();$$('[data-signal-row]').forEach(row=>{row.style.display=row.textContent.toLowerCase().includes(q)?'':'none'})}
function handleAction(a){if(a==='step'){const mhz=parseFloat(event.target.dataset.step)||0;tune(+(state.receiver.frequency+mhz).toFixed(6));refresh();toast((mhz>0?'+':'')+mhz+' MHz');return}if(a==='toggle-gps'){state.receiver.gps=!state.receiver.gps;emit('gps:toggle',{gps:state.receiver.gps});refresh();toast(state.receiver.gps?'GPS enabled':'GPS disabled')}if(a==='rf-calc'){calculateRf(event.target.dataset.rfType)}}
function init(){applyTheme();buildNav();buildToolbar();renderStatus();renderWorkspace(state.workspace,false);wire();emit('app:boot',{version:'14.9-sidebar-recovery'});setInterval(()=>{state.metrics.fps=Math.max(52,Math.min(60,state.metrics.fps+Math.round(Math.random()*2-1)));state.metrics.cpu=Math.max(8,Math.min(42,state.metrics.cpu+Math.round(Math.random()*4-2)));state.metrics.heap=Math.max(14,Math.min(40,(state.metrics.heap||18)+Math.round(Math.random()*2-1)));if(state.receiver.scanning){const m=nextMemory();tune(m.freq,m.mode)}renderStatus()},3000)}try{init()}catch(err){document.body.innerHTML=`<main style="padding:24px;font-family:system-ui"><h1>WebSDR Studio startup error</h1><pre>${escapeHtml(err.stack||String(err))}</pre></main>`}
})();
</script>
